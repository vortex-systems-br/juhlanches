<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUH LANCHES APP PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --card:#111;
  --primary:#ff4d00;
  --primary2:#ff7a00;
  --text:#fff;
  --muted:#aaa;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter;background:var(--bg);color:var(--text);}

.header{
  padding:15px;
  font-weight:800;
  font-size:1.2rem;
}

.grid{
  display:grid;
  gap:15px;
  padding:15px;
}

.card{
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-body{padding:15px;}

.price{color:#ffcc00;font-weight:800;}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,var(--primary),var(--primary2));
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--primary);
  padding:15px;
  border-radius:50px;
}

.modal{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#111;
  padding:20px;
  transition:.4s;
}

.modal.active{bottom:0;}

.item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="header">LUH LANCHES</div>

<div class="grid" id="produtos"></div>

<div class="float" onclick="openCart()">🛒 <span id="count">0</span></div>

<div class="modal" id="cart">
<h3>Carrinho</h3>
<div id="lista"></div>
<div id="total"></div>
<button class="btn" onclick="finalizar()">Finalizar</button>
</div>

<script>

// ===== PRODUTOS =====
const produtos=[
 {nome:"X-Burger",preco:30,img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
 {nome:"X-Bacon",preco:35,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
 {nome:"Hot Dog",preco:20,img:"https://images.unsplash.com/photo-1619740455993-9d4fd32f3f3d"}
];

// ===== CARRINHO =====
let carrinho=JSON.parse(localStorage.getItem("cart"))||[];

// ===== RENDER =====
function render(){
 let html="";
 produtos.forEach((p,i)=>{
  html+=`
   <div class="card">
    <img src="${p.img}">
    <div class="card-body">
     <h3>${p.nome}</h3>
     <div class="price">R$ ${p.preco}</div>
     <button class="btn" onclick="add(${i})">Adicionar</button>
    </div>
   </div>
  `;
 });
 document.getElementById("produtos").innerHTML=html;
}

render();

// ===== ADD =====
function add(i){
 carrinho.push(produtos[i]);
 salvar();
}

// ===== SALVAR =====
function salvar(){
 localStorage.setItem("cart",JSON.stringify(carrinho));
 update();
}

// ===== UPDATE =====
function update(){
 document.getElementById("count").innerText=carrinho.length;

 let html="";
 let total=0;

 carrinho.forEach((i,index)=>{
  total+=i.preco;
  html+=`
   <div class="item">
    ${i.nome} R$ ${i.preco}
    <button onclick="remove(${index})">❌</button>
   </div>
  `;
 });

 document.getElementById("lista").innerHTML=html;
 document.getElementById("total").innerText="Total: R$ "+total;
}

// ===== REMOVE =====
function remove(i){
 carrinho.splice(i,1);
 salvar();
}

// ===== CART =====
function openCart(){
 document.getElementById("cart").classList.toggle("active");
}

// ===== FINALIZAR =====
function finalizar(){
 let msg="Pedido:%0A";
 let total=0;

 carrinho.forEach(i=>{
  msg+=`${i.nome} R$ ${i.preco}%0A`;
  total+=i.preco;
 });

 msg+=`Total: R$ ${total}`;

 window.open(`https://wa.me/5518991381163?text=${msg}`);

 carrinho=[];
 salvar();
}

update();

</script>

</body>
</html>
