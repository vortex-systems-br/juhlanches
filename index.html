<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUH LANCHES • Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --card:#121212;
  --glass:rgba(255,255,255,0.05);
  --primary:#ff4d00;
  --primary2:#ff7a00;
  --text:#fff;
  --muted:#aaa;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Inter;
  background:linear-gradient(180deg,#050505,#0a0a0a);
  color:var(--text);
}

/* HEADER */
.header{
  padding:20px;
  font-size:1.3rem;
  font-weight:800;
}

/* GRID */
.grid{
  padding:15px;
  display:grid;
  gap:20px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.5);
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.01);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.price{
  color:#ffcc00;
  font-weight:800;
  margin:10px 0;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,var(--primary),var(--primary2));
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

/* MODAL PRODUTO */
.product-modal{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:20px;
  transition:.4s;
}

.product-modal.active{
  bottom:0;
}

/* ADDONS */
.addon{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:.9rem;
}

/* CART */
.cart{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#111;
  padding:20px;
  border-radius:20px 20px 0 0;
  transition:.4s;
}

.cart.active{
  bottom:0;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

/* FLOAT */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(45deg,var(--primary),var(--primary2));
  padding:15px 20px;
  border-radius:50px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🔥 LUH LANCHES</div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<div class="card-body">
<h3>X-Burger Premium</h3>
<div class="price">R$ 39,90</div>
<button class="btn" onclick="openProduct('X-Burger Premium',39.9)">Escolher</button>
</div>
</div>

</div>

<!-- MODAL PRODUTO -->
<div class="product-modal" id="product">
<h3 id="pname"></h3>

<div class="addon">
<span>Bacon</span>
<input type="checkbox" value="5" data-name="Bacon">
</div>

<div class="addon">
<span>Cheddar</span>
<input type="checkbox" value="4" data-name="Cheddar">
</div>

<button class="btn" onclick="addCart()">Adicionar ao carrinho</button>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Seu Pedido</h3>
<div id="items"></div>
<div id="total"></div>
<button class="btn" onclick="finish()">Finalizar</button>
</div>

<div class="float" onclick="toggleCart()">
🛒 <span id="count">0</span>
</div>

<script>
let carrinho=[];
let produtoAtual=null;

function openProduct(nome,preco){
  produtoAtual={nome,preco};
  document.getElementById("pname").innerText=nome;
  document.getElementById("product").classList.add("active");
}

function addCart(){
  let adicionais=[];
  let total=produtoAtual.preco;

  document.querySelectorAll("#product input:checked").forEach(i=>{
    adicionais.push(i.dataset.name);
    total+=parseFloat(i.value);
  });

  carrinho.push({
    nome:produtoAtual.nome,
    adicionais,
    preco:total
  });

  document.getElementById("product").classList.remove("active");
  update();
}

function update(){
  document.getElementById("count").innerText=carrinho.length;

  let html="";
  let total=0;

  carrinho.forEach((i,index)=>{
    total+=i.preco;
    html+=`
      <div class="item">
        ${i.nome} (${i.adicionais.join(", ")})
        R$ ${i.preco.toFixed(2)}
      </div>
    `;
  });

  document.getElementById("items").innerHTML=html;
  document.getElementById("total").innerText="Total: R$ "+total.toFixed(2);
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function finish(){
  let msg="Pedido:%0A";
  let total=0;

  carrinho.forEach(i=>{
    msg+=`- ${i.nome} (${i.adicionais.join(", ")}) R$ ${i.preco}%0A`;
    total+=i.preco;
  });

  msg+=`Total: R$ ${total}`;

  window.open(`https://wa.me/5518991381163?text=${msg}`);
}
</script>

</body>
</html>
