<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUH LANCHES | App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#060606;
  --card:#121212;
  --soft:#1b1b1b;
  --primary:#ff4d00;
  --primary2:#ff7a00;
  --text:#fff;
  --muted:#9a9a9a;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER APP */
.header{
  position:sticky;
  top:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(12px);
  padding:15px;
  z-index:1000;
  border-bottom:1px solid #222;
}

.header h1{
  font-size:1.2rem;
  font-weight:800;
}

.search{
  margin-top:10px;
  background:var(--soft);
  padding:10px 15px;
  border-radius:12px;
  color:var(--muted);
}

/* CATEGORIAS */
.categories{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:15px;
}

.cat{
  background:var(--soft);
  padding:10px 15px;
  border-radius:20px;
  white-space:nowrap;
  font-size:.9rem;
  cursor:pointer;
}

.cat.active{
  background:linear-gradient(45deg,var(--primary),var(--primary2));
}

/* GRID */
.grid{
  padding:15px;
  display:grid;
  gap:15px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition:.2s;
}

.card:hover{
  transform:scale(1.02);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.card h3{
  font-size:1rem;
  margin-bottom:5px;
}

.card p{
  font-size:.85rem;
  color:var(--muted);
  margin-bottom:10px;
}

.price{
  font-weight:800;
  color:#ffcc00;
  margin-bottom:10px;
}

.btn{
  background:linear-gradient(45deg,var(--primary),var(--primary2));
  border:none;
  padding:10px;
  width:100%;
  border-radius:10px;
  font-weight:700;
  color:#fff;
  cursor:pointer;
}

/* FLOAT BUTTON */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  box-shadow:0 10px 25px rgba(0,0,0,.5);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>LUH LANCHES</h1>
  <div class="search">🔍 Buscar lanche...</div>
</div>

<div class="categories">
  <div class="cat active">🍔 Hambúrguer</div>
  <div class="cat">🌭 Hot Dog</div>
  <div class="cat">🔥 Combos</div>
  <div class="cat">🥤 Bebidas</div>
</div>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
    <div class="card-body">
      <h3>X-Burger Premium</h3>
      <p>200g carne + cheddar + bacon</p>
      <div class="price">R$ 39,90</div>
      <button class="btn" onclick="pedido('X-Burger Premium')">Pedir</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <div class="card-body">
      <h3>Combo da Luh</h3>
      <p>Hambúrguer + batata + refri</p>
      <div class="price">R$ 45,00</div>
      <button class="btn" onclick="pedido('Combo da Luh')">Pedir</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1619740455993-9d4fd32f3f3d">
    <div class="card-body">
      <h3>Hot Dog Tradicional</h3>
      <p>Purê + vinagrete + batata palha</p>
      <div class="price">R$ 24,90</div>
      <button class="btn" onclick="pedido('Hot Dog Tradicional')">Pedir</button>
    </div>
  </div>

</div>

<div class="float" onclick="pedido('Quero fazer um pedido')">
📲
</div>

<script>
function pedido(item){
  const tel="5518991381163";
  const msg=encodeURIComponent("Olá, quero pedir: "+item);
  window.open(`https://wa.me/${tel}?text=${msg}`);
}
</script>

</body>
</html>
